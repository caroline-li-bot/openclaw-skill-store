# fly.toml app configuration file generated for openclaw-skill-store-api
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "openclaw-skill-store-api"
primary_region = "sin"
kill_signal = "SIGINT"
kill_timeout = 5
processes = []

[env]
  PORT = "8000"
  ENV = "production"

[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[statics]]
  guest_path = "/app/static"
  url_prefix = "/static"
